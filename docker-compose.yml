services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jogo_bixo"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 3g
    networks:
      - jogo_bixo_network

  backend:
    build:
      context: ./backend
    command: bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/code:delegated
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      USE_POSTGRES: ${USE_POSTGRES:-1}
      PYTHONUNBUFFERED: "1"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 3g
    networks:
      - jogo_bixo_network

  frontend:
    build:
      context: ./frontend/poke-bixo-app
    command: npm run dev -- --host 0.0.0.0 --port 8100
    volumes:
      - ./frontend/poke-bixo-app:/app:delegated
      - frontend_node_modules:/app/node_modules
    ports:
      - "8100:8100"
    mem_limit: 3g
    networks:
      - jogo_bixo_network

  mobile:
    build:
      context: ./mobile/poke-bicho-app
    command: npm run dev -- --host 0.0.0.0 --port 5000
    volumes:
      - ./mobile/poke-bicho-app:/app:delegated
      - mobile_node_modules:/app/node_modules
    ports:
      - "5000:5000"
    mem_limit: 3g
    networks:
      - jogo_bixo_network

  # devtools: omitted because no dedicated devtools app/directory was found in the repository
  # If you have a devtools app, add a service similar to frontend/mobile and expose port 8150

volumes:
  db_data:
  frontend_node_modules:
  mobile_node_modules:

networks:
  jogo_bixo_network:
    driver: bridge
